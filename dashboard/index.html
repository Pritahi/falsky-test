<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falsky — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 16'><polyline points='0,8 8,8 12,1 17,15 21,4 25,8 34,8' fill='none' stroke='%23FF4B2E' stroke-width='2.4'/></svg>">
<style>
:root{
  --ink:#0C1517;--ink2:#0F1B1E;--ink3:#0A1315;--ink4:#122024;
  --line:#1E3237;--line2:#2C464B;
  --paper:#F2E8D5;--red:#FF4B2E;--amber:#FFB020;--green:#3DDC84;
  --text:#D7E4E2;--muted:#8AA0A2;--dim:#5E767A;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--disp:'Anton',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--amber);color:#171310}
html,body{height:100%}
body{
  font-family:var(--sans);color:var(--text);background:var(--ink);
  background-image:
    radial-gradient(1100px 560px at 88% -8%,rgba(61,220,132,.05),transparent 60%),
    radial-gradient(900px 520px at -8% 40%,rgba(255,75,46,.045),transparent 55%),
    linear-gradient(rgba(120,160,165,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(120,160,165,.045) 1px,transparent 1px);
  background-size:auto,auto,46px 46px,46px 46px;background-attachment:fixed;overflow:hidden;
}
.grain{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/></filter><rect width="140" height="140" filter="url(%23n)"/></svg>')}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--ink3)}
::-webkit-scrollbar-thumb{background:var(--line2);border:2px solid var(--ink3)}
::-webkit-scrollbar-thumb:hover{background:var(--amber)}

.app{display:grid;grid-template-columns:242px 1fr;height:100vh}
.side{background:var(--ink2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 0}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-size:1.3rem;letter-spacing:.08em;color:var(--paper);padding:0 22px 20px;border-bottom:1px solid var(--line)}
.logo em{font-style:normal;color:var(--red)}
.station-id{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--dim);padding:16px 22px 8px}
nav{display:flex;flex-direction:column;gap:2px;padding:6px 10px}
.nitem{display:flex;align-items:center;gap:12px;padding:13px 12px;font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all .18s;user-select:none}
.nitem .idx{font-size:10px;color:var(--dim);transition:color .18s}
.nitem:hover{color:var(--paper);background:var(--ink4)}
.nitem.active{color:var(--amber);border-left-color:var(--amber);background:linear-gradient(90deg,rgba(255,176,32,.09),transparent)}
.nitem.active .idx{color:var(--amber)}
.side-foot{margin-top:auto;padding:16px 22px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);line-height:2.1}
.led{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;flex:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.mainwrap{display:flex;flex-direction:column;min-width:0;height:100vh}
.topbar{height:64px;flex:none;display:flex;align-items:center;gap:18px;padding:0 26px;border-bottom:1px solid var(--line);background:rgba(12,21,23,.92);backdrop-filter:blur(6px)}
.tb-title{font-family:var(--disp);font-weight:400;font-size:1.35rem;letter-spacing:.03em;color:var(--paper);line-height:1.05}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.tb-user{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted)}
.tb-logout{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--dim);cursor:pointer;border:1px solid var(--line2);padding:6px 12px;background:none;transition:all .18s}
.tb-logout:hover{border-color:var(--red);color:var(--red)}
.content{flex:1;overflow-y:auto;padding:28px 30px 60px}

.panel{position:relative;background:var(--ink2);border:1px solid var(--line2);box-shadow:8px 8px 0 rgba(0,0,0,.4)}
.panel:hover{box-shadow:10px 10px 0 rgba(0,0,0,.45)}
.phead{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:#9FB6B3}
.phead .spacer{margin-left:auto;color:var(--dim);letter-spacing:.1em}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{padding:20px;border-left:1px solid var(--line)}
.stat:first-child{border-left:none}
.stat small{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--dim);margin-bottom:8px}
.stat b{font-family:var(--disp);font-weight:400;font-size:2rem;color:var(--paper);letter-spacing:.02em;display:block;line-height:1}
.stat.green b{color:var(--green)}.stat.amber b{color:var(--amber)}.stat.red b{color:var(--red)}

.repo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.repo-card{padding:20px;cursor:pointer;transition:all .18s}
.repo-card:hover{transform:translateY(-2px);box-shadow:12px 12px 0 rgba(0,0,0,.5)}
.repo-card h3{font-family:var(--disp);font-size:1.2rem;letter-spacing:.03em;color:var(--paper);margin-bottom:8px}
.repo-card .meta{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--dim)}

.tests-table{width:100%;border-collapse:collapse}
.tests-table th{text-align:left;padding:10px 16px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--dim);border-bottom:1px solid var(--line);text-transform:uppercase}
.tests-table td{padding:10px 16px;font-family:var(--mono);font-size:12px;border-bottom:1px dashed rgba(30,50,55,.5);color:var(--muted)}
.tests-table tr:hover td{background:var(--ink4);color:var(--text)}
.tests-table .name{color:var(--paper);font-weight:500}
.mag-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 8px;border:1px solid;flex:none}
.m-lo{color:var(--green);border-color:rgba(61,220,132,.45);background:rgba(61,220,132,.07)}
.m-md{color:var(--amber);border-color:rgba(255,176,32,.45);background:rgba(255,176,32,.07)}
.m-hi{color:var(--red);border-color:rgba(255,75,46,.5);background:rgba(255,75,46,.08)}

.empty{text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--dim)}
.empty b{color:var(--muted);display:block;margin-bottom:8px;font-size:14px}

.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:12px 18px;border:2px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .16s;background:none}
.btn-amber{background:var(--amber);color:#171310;box-shadow:4px 4px 0 var(--red)}
.btn-amber:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--red)}

.toast{position:fixed;bottom:24px;right:24px;z-index:200;font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;padding:14px 20px;border:1px solid var(--line2);border-left:10px solid var(--amber);background:var(--ink2);color:var(--text);box-shadow:8px 8px 0 rgba(0,0,0,.5);transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.green{border-left-color:var(--green)}

@media(max-width:880px){
  .app{grid-template-columns:1fr;height:auto}
  .side{flex-direction:row;align-items:center;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--line);padding:12px 16px;gap:8px;position:sticky;top:0;z-index:50}
  .logo{border:none;padding:0 14px 0 0}
  .station-id,.side-foot{display:none}
  nav{flex-direction:row;padding:0;flex:1}
  .nitem{border-left:none;border-bottom:3px solid transparent;padding:10px 12px}
  .nitem.active{border-bottom-color:var(--amber)}
  .mainwrap{height:auto}
  .content{overflow:visible;padding:20px 16px 50px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .repo-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="grain"></div>

<div class="app">
  <aside class="side">
    <div class="logo">
      <svg width="32" height="15" viewBox="0 0 34 16" fill="none"><polyline points="0,8 8,8 12,1 17,15 21,4 25,8 34,8" stroke="#FF4B2E" stroke-width="2.4"/></svg>
      FALS<em>KY</em>
    </div>
    <div class="station-id" id="stationId">LOADING…</div>
    <nav>
      <div class="nitem active" data-view="overview"><span class="idx">01</span>OVERVIEW</div>
      <div class="nitem" data-view="repos"><span class="idx">02</span>REPOSITORIES</div>
      <div class="nitem" data-view="tests"><span class="idx">03</span>TEST RESULTS</div>
    </nav>
    <div class="side-foot">
      <div><span class="led"></span> CONNECTED</div>
      <div>Falsky v3.0</div>
    </div>
  </aside>

  <div class="mainwrap">
    <header class="topbar">
      <div class="tb-title" id="pageTitle">OVERVIEW</div>
      <div class="tb-right">
        <span class="tb-user" id="userName">—</span>
        <button class="tb-logout" onclick="doLogout()">SIGN OUT</button>
      </div>
    </header>

    <main class="content">
      <!-- OVERVIEW -->
      <section id="view-overview">
        <div class="stats-grid" id="statsGrid">
          <div class="panel stat"><small>TOTAL REPOS</small><b id="sRepos">—</b></div>
          <div class="panel stat green"><small>TOTAL TESTS</small><b id="sTests">—</b></div>
          <div class="panel stat amber"><small>FLAKY TESTS</small><b id="sFlaky">—</b></div>
          <div class="panel stat red"><small>AVG TRUST</small><b id="sTrust">—</b></div>
        </div>
        <div class="panel">
          <div class="phead"><span class="led"></span> RECENT REPOS <span class="spacer">CLICK TO INSPECT</span></div>
          <div id="repoList"></div>
        </div>
      </section>

      <!-- REPOS -->
      <section id="view-repos" style="display:none">
        <div class="repo-grid" id="repoGrid"></div>
      </section>

      <!-- TESTS -->
      <section id="view-tests" style="display:none">
        <div class="panel">
          <div class="phead"><span class="led"></span> TEST RESULTS <span class="spacer" id="testCount">—</span></div>
          <table class="tests-table">
            <thead><tr><th>Test</th><th>Trust</th><th>Pass Rate</th><th>Runs</th><th>Category</th></tr></thead>
            <tbody id="testsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentUser = null;
let repos = [];

function show(view) {
  document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
  document.getElementById('view-' + view).style.display = 'block';
  document.querySelectorAll('.nitem').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const titles = {overview:'OVERVIEW',repos:'REPOSITORIES',tests:'TEST RESULTS'};
  document.getElementById('pageTitle').textContent = titles[view] || view.toUpperCase();
}

document.querySelectorAll('.nitem').forEach(n => n.addEventListener('click', () => show(n.dataset.view)));

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function doLogout() {
  await fetch(API + '/api/user/logout', {method:'POST'});
  window.location.href = '/login';
}

function magBadge(score) {
  if (score >= 80) return '<span class="mag-badge m-lo">' + score + '</span>';
  if (score >= 50) return '<span class="mag-badge m-md">' + score + '</span>';
  return '<span class="mag-badge m-hi">' + score + '</span>';
}

async function loadUser() {
  try {
    const res = await fetch(API + '/api/user/me');
    if (!res.ok) { window.location.href = '/login'; return; }
    currentUser = await res.json();
    document.getElementById('userName').textContent = currentUser.name || currentUser.email;
    document.getElementById('stationId').textContent = (currentUser.name || currentUser.email).toUpperCase();
  } catch(e) { window.location.href = '/login'; }
}

async function loadRepos() {
  try {
    const res = await fetch(API + '/api/repos');
    const data = await res.json();
    repos = data.repos || [];
    document.getElementById('sRepos').textContent = repos.length;

    const list = document.getElementById('repoList');
    const grid = document.getElementById('repoGrid');

    if (repos.length === 0) {
      list.innerHTML = '<div class="empty"><b>NO REPOS YET</b>Connect a repo via the GitHub Action to start tracking.</div>';
      grid.innerHTML = '<div class="empty"><b>NO REPOS YET</b>Install falsky-action in your CI pipeline.</div>';
      return;
    }

    list.innerHTML = repos.map(r => `
      <div style="padding:14px 20px;border-bottom:1px dashed var(--line);cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--muted);transition:all .18s" onmouseover="this.style.background='var(--ink4)'" onmouseout="this.style.background=''" onclick="loadTests('${r.name}')">
        <span style="color:var(--paper);font-weight:500">${r.name}</span>
        <span style="float:right;color:var(--dim);font-size:10px">ID: ${r.id}</span>
      </div>
    `).join('');

    grid.innerHTML = repos.map(r => `
      <div class="panel repo-card" onclick="loadTests('${r.name}')">
        <h3>${r.name}</h3>
        <div class="meta">ID: ${r.id} · Created: ${new Date(r.created_at).toLocaleDateString()}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('repoList').innerHTML = '<div class="empty"><b>ERROR</b>Could not load repositories.</div>';
  }
}

async function loadTests(repoName) {
  show('tests');
  const body = document.getElementById('testsBody');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--dim)">Loading…</td></tr>';

  try {
    const res = await fetch(API + '/api/dashboard?repo_name=' + encodeURIComponent(repoName));
    const data = await res.json();

    const tests = data.tests || [];
    document.getElementById('testCount').textContent = tests.length + ' TESTS · ' + repoName;

    let totalTests = tests.length;
    let flakyCount = tests.filter(t => (t.trust_score || 100) < 50).length;
    let avgTrust = tests.length > 0 ? Math.round(tests.reduce((s,t) => s + (t.trust_score || 100), 0) / tests.length) : 100;

    document.getElementById('sTests').textContent = totalTests;
    document.getElementById('sFlaky').textContent = flakyCount;
    document.getElementById('sTrust').textContent = avgTrust;

    if (tests.length === 0) {
      body.innerHTML = '<tr><td colspan="5" class="empty">No test results for this repo yet.</td></tr>';
      return;
    }

    body.innerHTML = tests.sort((a,b) => (a.trust_score||100) - (b.trust_score||100)).map(t => `
      <tr>
        <td class="name">${t.test_name || t.name || '—'}</td>
        <td>${magBadge(Math.round(t.trust_score || 100))}</td>
        <td>${t.pass_rate != null ? Math.round(t.pass_rate * 100) + '%' : '—'}</td>
        <td>${t.runs || '—'}</td>
        <td>${t.flaky_category || '—'}</td>
      </tr>
    `).join('');
  } catch(e) {
    body.innerHTML = '<tr><td colspan="5" class="empty">Error loading tests.</td></tr>';
  }
}

// Init
loadUser().then(() => loadRepos());
</script>
</body>
</html>
