<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falsky — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 16'><polyline points='0,8 8,8 12,1 17,15 21,4 25,8 34,8' fill='none' stroke='%23FFB224' stroke-width='2.4'/></svg>">
<style>
:root{
  --bg:#F2F1EC; --ink:#16181D; --mut:#6B6F76; --line:#DFDED6;
  --panel:#191C22; --tile:#23272F; --tile2:#2B303A; --hair:#262B33;
  --ok:#2FBF71; --okB:#39D98A; --bad:#E5484D; --badB:#FF6B5E; --warn:#F5A524; --warnB:#FFB224;
  --disp:"Archivo",sans-serif; --mono:"Space Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--warn);color:var(--ink)}
body{
  font-family:var(--disp);color:var(--ink);background:var(--bg);min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

.auth-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}

/* Logo */
.logo{font:800 20px var(--disp);letter-spacing:-.03em;display:flex;align-items:center;gap:9px;margin-bottom:32px;justify-content:center;color:var(--ink)}
.logo i{width:10px;height:10px;background:var(--ink);transition:transform .35s,background .35s;border-radius:2px}
.logo:hover i{transform:rotate(180deg);background:var(--warn)}
.logo svg{flex-shrink:0}

/* Card */
.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(22,24,29,.12);position:relative;overflow:hidden}
.card-head{padding:28px 32px 0;text-align:center}
.card-head h1{font:800 1.8rem var(--disp);color:var(--ink);letter-spacing:-.03em;margin-bottom:6px}
.card-head p{font:400 11px var(--mono);color:var(--mut);letter-spacing:.12em}
.card-body{padding:28px 32px 32px}

/* Google Button */
.google-btn{width:100%;padding:14px;background:var(--ink);color:var(--bg);border:1.5px solid var(--ink);font:700 14px var(--disp);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all .18s;text-decoration:none;border-radius:7px}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(22,24,29,.22)}
.google-btn:active{transform:scale(.97)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}

/* Info */
.info{margin-top:20px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--mut);line-height:1.7}
.info a{color:var(--warn);text-decoration:none}
.info a:hover{text-decoration:underline}

/* API Key display (after login) */
.apikey-box{display:none;margin-top:24px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:7px}
.apikey-box.show{display:block}
.apikey-box .label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--mut);margin-bottom:8px;text-transform:uppercase}
.apikey-box .key{font-family:var(--mono);font-size:13px;color:var(--ok);word-break:break-all;padding:10px;background:var(--bg);border:1px solid var(--line);cursor:pointer;transition:all .2s;user-select:all;border-radius:7px}
.apikey-box .key:hover{border-color:var(--ok)}
.apikey-box .hint{font-family:var(--mono);font-size:10px;color:var(--mut);margin-top:8px;letter-spacing:.1em}
.apikey-box .actions{display:flex;gap:8px;margin-top:12px}
.apikey-box .actions a{flex:1;text-align:center;padding:10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-decoration:none;transition:all .18s;border:1px solid var(--line);color:var(--mut);border-radius:7px}
.apikey-box .actions a:hover{border-color:var(--warn);color:var(--warn)}
.apikey-box .actions a.primary{background:var(--warn);color:var(--ink);border-color:var(--warn);font-weight:600}
.apikey-box .actions a.primary:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(245,165,36,.35)}

/* Footer */
.footer{margin-top:24px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--mut)}
.footer a{color:var(--warn);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Seismo line animation */
.seismo{margin:20px 0 8px;opacity:.4}
.seismo svg{width:100%;height:40px}

/* Toggle link */
.toggle-link{color:var(--warn);cursor:pointer}

@media(max-width:480px){
  .auth-wrap{padding:12px}
  .card-head,.card-body{padding-left:20px;padding-right:20px}
}
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="logo">
    <svg width="34" height="16" viewBox="0 0 34 16" fill="none"><polyline points="0,8 8,8 12,1 17,15 21,4 25,8 34,8" stroke="#FFB224" stroke-width="2.4"/></svg>
    <i></i>Falsky
  </div>

  <div class="card">
    <div class="card-head">
      <h1>Sign In</h1>
      <p>Access your trust layer</p>
    </div>
    <div class="card-body">
      <!-- Seismo line -->
      <div class="seismo">
        <svg viewBox="0 0 300 40" fill="none"><polyline points="0,20 30,20 45,20 55,5 65,35 75,10 85,28 95,20 120,20 140,20 150,8 160,32 170,15 180,25 190,20 220,20 250,20 260,12 270,28 280,20 300,20" stroke="#FFB224" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="stroke-dasharray" values="0,600;600,0" dur="3s" repeatCount="indefinite"/></polyline></svg>
      </div>

      <!-- Email/Password Login -->
      <form id="loginForm" onsubmit="doLogin(event)">
        <input type="email" id="loginEmail" placeholder="Email" required style="width:100%;padding:12px 14px;background:#fff;color:var(--ink);border:1px solid var(--line);font-family:var(--mono);font-size:13px;margin-bottom:10px;border-radius:7px;outline:none">
        <input type="password" id="loginPass" placeholder="Password" required style="width:100%;padding:12px 14px;background:#fff;color:var(--ink);border:1px solid var(--line);font-family:var(--mono);font-size:13px;margin-bottom:14px;border-radius:7px;outline:none">
        <button type="submit" class="google-btn">Sign In</button>
      </form>

      <div style="text-align:center;margin:14px 0;font-family:var(--mono);font-size:11px;color:var(--mut)">or</div>

      <form id="registerForm" onsubmit="doRegister(event)" style="display:none">
        <input type="text" id="regName" placeholder="Name" required style="width:100%;padding:12px 14px;background:#fff;color:var(--ink);border:1px solid var(--line);font-family:var(--mono);font-size:13px;margin-bottom:10px;border-radius:7px;outline:none">
        <input type="email" id="regEmail" placeholder="Email" required style="width:100%;padding:12px 14px;background:#fff;color:var(--ink);border:1px solid var(--line);font-family:var(--mono);font-size:13px;margin-bottom:10px;border-radius:7px;outline:none">
        <input type="password" id="regPass" placeholder="Password" required style="width:100%;padding:12px 14px;background:#fff;color:var(--ink);border:1px solid var(--line);font-family:var(--mono);font-size:13px;margin-bottom:14px;border-radius:7px;outline:none">
        <button type="submit" class="google-btn" style="background:var(--warn);border-color:var(--warn);color:var(--ink)">Create Account</button>
      </form>

      <div id="toggleAuth" style="text-align:center;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--mut);cursor:pointer" onclick="toggleForms()">
        Don't have an account? <span style="color:var(--warn)">Sign Up</span>
      </div>

      <div class="info">
        Free forever · API key auto-generated
      </div>

      <!-- API Key Display (after login) -->
      <div class="apikey-box" id="apikeyBox">
        <div class="label">Your API Key</div>
        <div class="key" id="apikeyValue" onclick="copyKey()">—</div>
        <div class="hint">Click to copy · Keep this secret</div>
        <div class="actions">
          <a href="./" class="primary">Open Dashboard →</a>
          <a href="#" onclick="doLogout();return false">Sign Out</a>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="/">← Back to home</a> · Falsky Trust Layer v3.0
  </div>
</div>

<script>
// Check if already logged in — redirect straight to dashboard
(async () => {
  try {
    const res = await fetch('/api/user/me');
    if (res.ok) {
      window.location.href = '/dashboard/';
      return;
    }
  } catch(e) {}
})();

let isLogin = true;
function toggleForms() {
  isLogin = !isLogin;
  document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
  document.getElementById('toggleAuth').innerHTML = isLogin
    ? 'Don\'t have an account? <span style="color:var(--warn)">Sign Up</span>'
    : 'Already have an account? <span style="color:var(--warn)">Sign In</span>';
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPass').value;
  try {
    const res = await fetch('/api/user/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/dashboard/';
    } else {
      alert(data.detail || 'Login failed');
    }
  } catch(err) { alert('Network error'); }
}

async function doRegister(e) {
  e.preventDefault();
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPass').value;
  try {
    const res = await fetch('/api/user/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/dashboard/';
    } else {
      alert(data.detail || 'Registration failed');
    }
  } catch(err) { alert('Network error'); }
}

function copyKey() {
  const key = document.getElementById('apikeyValue').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const el = document.getElementById('apikeyValue');
    el.style.borderColor = 'var(--ok)';
    setTimeout(() => el.style.borderColor = '', 1200);
  });
}

async function doLogout() {
  await fetch('/api/user/logout', {method: 'POST'});
  location.reload();
}
</script>
</body>
</html>
